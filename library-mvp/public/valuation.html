<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca | Valor total</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Valor da Biblioteca</h1>
      <p>Estimativa total, categorias, histórico e exportação em PDF.</p>
    </div>
    <nav>
      <a class="nav-link" href="/catalog.html">Catálogo</a>
      <a class="nav-link active" href="/valuation.html">Valor total</a>
    </nav>
  </header>

  <main class="layout single-column">
    <section class="panel">
      <div class="actions between">
        <div>
          <h2>Resumo</h2>
          <p class="muted">O sistema usa cache de preços por 7 dias.</p>
        </div>
        <div class="actions">
          <button id="refresh-prices-btn">Atualizar preços</button>
          <a class="button-link" href="/api/valuation/report.pdf" target="_blank">Exportar PDF</a>
        </div>
      </div>

      <div id="summary-cards" class="summary-grid"></div>
    </section>

    <section class="panel">
      <h2>Valor por categoria</h2>
      <div id="category-table"></div>
    </section>

    <section class="panel">
      <h2>Histórico de valorização</h2>
      <div id="history-table"></div>
    </section>
  </main>

  <script src="/js/valuation.js"></script>
</body>
</html>
